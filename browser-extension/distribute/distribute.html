<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 一键分发</title>
  <link rel="stylesheet" href="distribute.css">
</head>
<body>
  <!-- Top Bar -->
  <header class="top-bar">
    <div class="top-left">
      <img src="../icons/icon48.png" alt="icon" class="app-icon">
      <div class="app-info">
        <h1 class="app-name">Markdown Paste Helper</h1>
        <p class="app-subtitle">一键分发到多个平台</p>
      </div>
    </div>
    <div class="top-right">
      <button id="distributeBtn" class="distribute-btn">
        <span class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg></span>
        <span class="btn-text">开始分发</span>
      </button>
    </div>
  </header>

  <!-- Platform Bar -->
  <section class="platform-bar">
    <div class="platform-scroll">
      <div class="platform-item" data-platform="zhihu">
        <div class="platform-checkbox">
          <input type="checkbox" class="checkbox-input">
          <span class="checkbox-custom"></span>
        </div>
        <div class="platform-status">
          <span class="status-indicator checking"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></span>
        </div>
        <div class="platform-clickable">
          <div class="platform-icon"><img src="https://static.zhihu.com/static/favicon.ico" alt="知乎"></div>
          <div class="platform-name">知乎</div>
        </div>
        <div class="platform-progress" style="display: none;">
          <div class="progress-message"></div>
          <div class="progress-time"></div>
        </div>
      </div>

      <div class="platform-item" data-platform="wechat">

          <input type="checkbox" class="checkbox-input">

        </div>

        </div>
        <div class="platform-clickable">
          <div class="platform-icon"><img src="../icons/csdn.ico" alt="CSDN"></div>

        </div>
        <div class="platform-clickable">
          <div class="platform-icon"><img src="../icons/cnblogs.ico" alt="博客园"></div>
          <div class="platform-name">博客园</div>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Left: Editor -->
    <section class="editor-section">
      <div class="section-header">
        <h2>Markdown 编辑器</h2>
        <div class="editor-actions">
          <input type="file" id="fileInput" accept=".md,.markdown,.txt" style="display: none;">
          <button id="importBtn" class="icon-btn" title="导入文件"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M12 12v6"/><path d="m15 15-3-3-3 3"/></svg></button>
          <button id="clearBtn" class="icon-btn" title="清空"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg></button>
        </div>
      </div>
      <textarea id="markdownInput" placeholder="在此输入或粘贴 Markdown 内容...

支持拖拽 .md 文件到此处"></textarea>
      <div class="editor-footer">
        <span id="charCount" class="char-count">0 字符</span>
        <span id="fileName" class="file-name"></span>
      </div>
    </section>

    <!-- Right: Preview -->
    <section class="preview-section">
      <div class="section-header">
        <h2>实时预览</h2>
        <button id="refreshPreviewBtn" class="icon-btn" title="刷新预览"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg></button>
      </div>
      <div id="previewContent" class="preview-content">
        <div class="preview-placeholder">
          <div class="placeholder-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.376 3.622a1 1 0 0 1 3.002 3.002L7.368 18.635a2 2 0 0 1-.855.506l-2.872.838a.5.5 0 0 1-.62-.62l.838-2.872a2 2 0 0 1 .506-.854z"/></svg></div>
          <p>在左侧输入 Markdown 内容</p>
          <p class="placeholder-hint">预览将实时更新</p>
        </div>
      </div>
    </section>
  </main>

  <script src="../lib/markdown-it.min.js"></script>
  <script src="../lib/highlight.min.js"></script>
  <script src="distribute.js"></script>
</body>
</html>
